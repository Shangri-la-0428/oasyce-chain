# Rate limiting zones
limit_req_zone $binary_remote_addr zone=rest:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=rpc:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=faucet:10m rate=10r/m;

# REST API proxy (:1317 -> :11317 internal)
server {
    listen 1317;
    server_name _;

    location / {
        limit_req zone=rest burst=20 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:11317;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }
}

# RPC proxy (:26657 -> :26667 internal)
server {
    listen 26657;
    server_name _;

    location / {
        limit_req zone=rpc burst=10 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:26667;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    # WebSocket support for /websocket
    location /websocket {
        proxy_pass http://127.0.0.1:26667/websocket;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# Faucet proxy (:8080 -> :18080 internal)
server {
    listen 8080;
    server_name _;

    location / {
        limit_req zone=faucet burst=2 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:18080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

# Landing page (oasyce.com)
server {
    listen 80;
    server_name oasyce.com www.oasyce.com chain.oasyce.com;

    root /var/www/oasyce;
    index index.html;

    # AI discovery endpoints — proxy to chain REST API
    location = /llms.txt {
        proxy_pass http://127.0.0.1:11317/llms.txt;
        proxy_set_header Host $host;
        default_type text/plain;
    }

    location = /.well-known/oasyce.json {
        proxy_pass http://127.0.0.1:11317/.well-known/oasyce.json;
        proxy_set_header Host $host;
        default_type application/json;
    }

    location /api/ {        proxy_pass http://127.0.0.1:11317/;        proxy_set_header Host $host;        proxy_read_timeout 10s;    }
    location = /openapi.yaml {
        proxy_pass http://127.0.0.1:11317/openapi.yaml;
        proxy_set_header Host $host;
        default_type text/yaml;
    }

    # Claude AI Proxy
    location /proxy/ {
        proxy_pass http://127.0.0.1:8090/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
        proxy_buffering off;
    }

    # Static files
    location / {
        try_files $uri $uri/ =404;
    }

    # Cache static assets
    location ~* \.(css|js|png|jpg|svg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
