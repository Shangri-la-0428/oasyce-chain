# /etc/systemd/journald.conf.d/oasyced.conf
# Limits journal disk usage for the Oasyce node.
# Install: cp deploy/journald-oasyced.conf /etc/systemd/journald.conf.d/oasyced.conf
#          systemctl restart systemd-journald

[Journal]
SystemMaxUse=500M
SystemMaxFileSize=50M
MaxRetentionSec=7day
Compress=yes
