openapi: 3.0.3
info:
  title: Oasyce Chain REST API
  description: |
    REST API for the Oasyce L1 blockchain, built on Cosmos SDK v0.50.
    Oasyce is a global AI intelligence and memory free market with seven custom modules:
    datarights, settlement, capability, reputation, work, onboarding, and halving.

    All custom module endpoints are served via gRPC-Gateway.
    Standard Cosmos SDK, IBC, and bank endpoints are also available.
  version: 1.0.0
  contact:
    name: Oasyce
  license:
    name: Apache 2.0

servers:
  - url: http://localhost:1317
    description: Local development node

tags:
  - name: DataRights
    description: Data asset registration, shares, and dispute resolution
  - name: Settlement
    description: Escrow management and bonding curve pricing
  - name: Capability
    description: AI capability registration, discovery, and earnings
  - name: Reputation
    description: Reputation scores, feedback, and leaderboards
  - name: Bank
    description: Cosmos SDK bank module
  - name: Staking
    description: Cosmos SDK staking module
  - name: Governance
    description: Cosmos SDK governance module
  - name: IBC
    description: Inter-Blockchain Communication

paths:
  # ─── DataRights Module ────────────────────────────────────────────────

  /oasyce/datarights/v1/data_asset/{asset_id}:
    get:
      tags: [DataRights]
      summary: Query a data asset by ID
      operationId: DataAsset
      parameters:
        - name: asset_id
          in: path
          required: true
          schema:
            type: string
          description: Unique identifier of the data asset
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryDataAssetResponse"
        "404":
          description: Data asset not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /oasyce/datarights/v1/data_assets:
    get:
      tags: [DataRights]
      summary: Query all data assets with optional filters
      operationId: DataAssets
      parameters:
        - name: tag
          in: query
          required: false
          schema:
            type: string
          description: Filter data assets by tag. Empty returns all.
        - name: owner
          in: query
          required: false
          schema:
            type: string
          description: Filter data assets by owner address. Empty returns all.
        - $ref: "#/components/parameters/PaginationKey"
        - $ref: "#/components/parameters/PaginationOffset"
        - $ref: "#/components/parameters/PaginationLimit"
        - $ref: "#/components/parameters/PaginationCountTotal"
        - $ref: "#/components/parameters/PaginationReverse"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryDataAssetsResponse"

  /oasyce/datarights/v1/shares/{asset_id}:
    get:
      tags: [DataRights]
      summary: Query shareholders of a data asset
      operationId: Shares
      parameters:
        - name: asset_id
          in: path
          required: true
          schema:
            type: string
          description: ID of the data asset to query shareholders for
        - $ref: "#/components/parameters/PaginationKey"
        - $ref: "#/components/parameters/PaginationOffset"
        - $ref: "#/components/parameters/PaginationLimit"
        - $ref: "#/components/parameters/PaginationCountTotal"
        - $ref: "#/components/parameters/PaginationReverse"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuerySharesResponse"

  /oasyce/datarights/v1/dispute/{dispute_id}:
    get:
      tags: [DataRights]
      summary: Query a dispute by ID
      operationId: Dispute
      parameters:
        - name: dispute_id
          in: path
          required: true
          schema:
            type: string
          description: Unique identifier of the dispute
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryDisputeResponse"
        "404":
          description: Dispute not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /oasyce/datarights/v1/disputes:
    get:
      tags: [DataRights]
      summary: Query all disputes with optional asset filter
      operationId: Disputes
      parameters:
        - name: asset_id
          in: query
          required: false
          schema:
            type: string
          description: Filter disputes by asset ID. Empty returns all.
        - $ref: "#/components/parameters/PaginationKey"
        - $ref: "#/components/parameters/PaginationOffset"
        - $ref: "#/components/parameters/PaginationLimit"
        - $ref: "#/components/parameters/PaginationCountTotal"
        - $ref: "#/components/parameters/PaginationReverse"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryDisputesResponse"

  # ─── Settlement Module ────────────────────────────────────────────────

  /oasyce/settlement/v1/escrow/{escrow_id}:
    get:
      tags: [Settlement]
      summary: Query an escrow by ID
      operationId: Escrow
      parameters:
        - name: escrow_id
          in: path
          required: true
          schema:
            type: string
          description: Unique identifier of the escrow
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryEscrowResponse"
        "404":
          description: Escrow not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /oasyce/settlement/v1/escrows/{creator}:
    get:
      tags: [Settlement]
      summary: Query all escrows created by a given address
      operationId: EscrowsByCreator
      parameters:
        - name: creator
          in: path
          required: true
          schema:
            type: string
          description: Bech32 address of the escrow creator
        - $ref: "#/components/parameters/PaginationKey"
        - $ref: "#/components/parameters/PaginationOffset"
        - $ref: "#/components/parameters/PaginationLimit"
        - $ref: "#/components/parameters/PaginationCountTotal"
        - $ref: "#/components/parameters/PaginationReverse"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryEscrowsByCreatorResponse"

  /oasyce/settlement/v1/bonding_curve/{asset_id}:
    get:
      tags: [Settlement]
      summary: Query the current bonding curve price for an asset
      description: |
        Returns the current price per share on the Bancor bonding curve
        and the full bonding curve state including reserve and supply.
        Formula: tokens = supply * (sqrt(1 + payment/reserve) - 1), CW=0.5
      operationId: BondingCurvePrice
      parameters:
        - name: asset_id
          in: path
          required: true
          schema:
            type: string
          description: ID of the data asset
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryBondingCurvePriceResponse"
        "404":
          description: Asset bonding curve not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ─── Capability Module ────────────────────────────────────────────────

  /oasyce/capability/v1/capability/{capability_id}:
    get:
      tags: [Capability]
      summary: Query a capability by ID
      operationId: Capability
      parameters:
        - name: capability_id
          in: path
          required: true
          schema:
            type: string
          description: Unique identifier of the capability
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryCapabilityResponse"
        "404":
          description: Capability not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /oasyce/capability/v1/capabilities:
    get:
      tags: [Capability]
      summary: Query all capabilities with optional tag filter
      operationId: Capabilities
      parameters:
        - name: tag
          in: query
          required: false
          schema:
            type: string
          description: Filter capabilities by tag. Empty returns all.
        - $ref: "#/components/parameters/PaginationKey"
        - $ref: "#/components/parameters/PaginationOffset"
        - $ref: "#/components/parameters/PaginationLimit"
        - $ref: "#/components/parameters/PaginationCountTotal"
        - $ref: "#/components/parameters/PaginationReverse"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryCapabilitiesResponse"

  /oasyce/capability/v1/capabilities/provider/{provider}:
    get:
      tags: [Capability]
      summary: Query capabilities registered by a provider
      operationId: CapabilitiesByProvider
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
          description: Bech32 address of the capability provider
        - $ref: "#/components/parameters/PaginationKey"
        - $ref: "#/components/parameters/PaginationOffset"
        - $ref: "#/components/parameters/PaginationLimit"
        - $ref: "#/components/parameters/PaginationCountTotal"
        - $ref: "#/components/parameters/PaginationReverse"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryCapabilitiesByProviderResponse"

  /oasyce/capability/v1/earnings/{provider}:
    get:
      tags: [Capability]
      summary: Query total earnings for a provider
      description: |
        Returns the total amount earned across all capabilities
        and the total number of successful invocations for the given provider.
      operationId: Earnings
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
          description: Bech32 address of the capability provider
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryEarningsResponse"

  # ─── Reputation Module ────────────────────────────────────────────────

  /oasyce/reputation/v1/reputation/{address}:
    get:
      tags: [Reputation]
      summary: Query the reputation score of an address
      operationId: Reputation
      parameters:
        - name: address
          in: path
          required: true
          schema:
            type: string
          description: Bech32 address to query reputation for
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryReputationResponse"
        "404":
          description: Reputation not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /oasyce/reputation/v1/feedback/{invocation_id}:
    get:
      tags: [Reputation]
      summary: Query feedback for a given invocation
      operationId: Feedback
      parameters:
        - name: invocation_id
          in: path
          required: true
          schema:
            type: string
          description: ID of the invocation to query feedback for
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryFeedbackResponse"

  /oasyce/reputation/v1/leaderboard:
    get:
      tags: [Reputation]
      summary: Query the top-rated providers
      operationId: Leaderboard
      parameters:
        - $ref: "#/components/parameters/PaginationKey"
        - $ref: "#/components/parameters/PaginationOffset"
        - $ref: "#/components/parameters/PaginationLimit"
        - $ref: "#/components/parameters/PaginationCountTotal"
        - $ref: "#/components/parameters/PaginationReverse"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryLeaderboardResponse"

  # ─── Cosmos SDK Standard Endpoints ────────────────────────────────────

  /cosmos/bank/v1beta1/balances/{address}:
    get:
      tags: [Bank]
      summary: Query all balances for an address
      operationId: AllBalances
      parameters:
        - name: address
          in: path
          required: true
          schema:
            type: string
          description: Bech32 account address
        - $ref: "#/components/parameters/PaginationKey"
        - $ref: "#/components/parameters/PaginationLimit"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  balances:
                    type: array
                    items:
                      $ref: "#/components/schemas/Coin"
                  pagination:
                    $ref: "#/components/schemas/PageResponse"

  /cosmos/staking/v1beta1/validators:
    get:
      tags: [Staking]
      summary: Query all validators
      operationId: Validators
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
          description: Filter by validator status (BOND_STATUS_BONDED, BOND_STATUS_UNBONDED, BOND_STATUS_UNBONDING)
        - $ref: "#/components/parameters/PaginationKey"
        - $ref: "#/components/parameters/PaginationLimit"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  validators:
                    type: array
                    items:
                      type: object
                      description: Validator object
                  pagination:
                    $ref: "#/components/schemas/PageResponse"

  /cosmos/gov/v1/proposals:
    get:
      tags: [Governance]
      summary: Query all proposals
      operationId: Proposals
      parameters:
        - name: proposal_status
          in: query
          required: false
          schema:
            type: string
            enum:
              - PROPOSAL_STATUS_UNSPECIFIED
              - PROPOSAL_STATUS_DEPOSIT_PERIOD
              - PROPOSAL_STATUS_VOTING_PERIOD
              - PROPOSAL_STATUS_PASSED
              - PROPOSAL_STATUS_REJECTED
              - PROPOSAL_STATUS_FAILED
          description: Filter by proposal status
        - $ref: "#/components/parameters/PaginationKey"
        - $ref: "#/components/parameters/PaginationLimit"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  proposals:
                    type: array
                    items:
                      type: object
                      description: Proposal object
                  pagination:
                    $ref: "#/components/schemas/PageResponse"

  # ─── IBC Endpoints ───────────────────────────────────────────────────

  /ibc/core/channel/v1/channels:
    get:
      tags: [IBC]
      summary: Query all IBC channels
      operationId: Channels
      parameters:
        - $ref: "#/components/parameters/PaginationKey"
        - $ref: "#/components/parameters/PaginationLimit"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  channels:
                    type: array
                    items:
                      type: object
                      description: IBC Channel object
                  pagination:
                    $ref: "#/components/schemas/PageResponse"
                  height:
                    type: object
                    properties:
                      revision_number:
                        type: string
                      revision_height:
                        type: string

  /ibc/apps/transfer/v1/denom_traces:
    get:
      tags: [IBC]
      summary: Query all denomination traces
      operationId: DenomTraces
      parameters:
        - $ref: "#/components/parameters/PaginationKey"
        - $ref: "#/components/parameters/PaginationLimit"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  denom_traces:
                    type: array
                    items:
                      type: object
                      properties:
                        path:
                          type: string
                          description: The transfer path (e.g. transfer/channel-0)
                        base_denom:
                          type: string
                          description: The base denomination
                  pagination:
                    $ref: "#/components/schemas/PageResponse"

components:
  parameters:
    PaginationKey:
      name: pagination.key
      in: query
      required: false
      schema:
        type: string
        format: byte
      description: Key for the next page (base64-encoded)

    PaginationOffset:
      name: pagination.offset
      in: query
      required: false
      schema:
        type: string
        format: uint64
      description: Offset for pagination (alternative to key)

    PaginationLimit:
      name: pagination.limit
      in: query
      required: false
      schema:
        type: string
        format: uint64
      description: Maximum number of results to return

    PaginationCountTotal:
      name: pagination.count_total
      in: query
      required: false
      schema:
        type: boolean
      description: Whether to include total count in the response

    PaginationReverse:
      name: pagination.reverse
      in: query
      required: false
      schema:
        type: boolean
      description: Whether to reverse the order of results

  schemas:
    # ─── Common ─────────────────────────────────────────────────────────

    Coin:
      type: object
      properties:
        denom:
          type: string
          example: uoas
        amount:
          type: string
          example: "1000000"
      required: [denom, amount]

    PageResponse:
      type: object
      properties:
        next_key:
          type: string
          format: byte
          description: Key for the next page (base64-encoded), null if no more pages
          nullable: true
        total:
          type: string
          format: uint64
          description: Total number of results (only set if count_total was requested)

    ErrorResponse:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        details:
          type: array
          items:
            type: object

    Timestamp:
      type: string
      format: date-time
      description: RFC 3339 timestamp
      example: "2026-01-15T10:30:00Z"

    # ─── DataRights Schemas ─────────────────────────────────────────────

    RightsType:
      type: string
      enum:
        - RIGHTS_TYPE_UNSPECIFIED
        - RIGHTS_TYPE_ORIGINAL
        - RIGHTS_TYPE_CO_CREATION
        - RIGHTS_TYPE_LICENSED
        - RIGHTS_TYPE_COLLECTION
      description: Rights classification of a data asset

    DisputeStatus:
      type: string
      enum:
        - DISPUTE_STATUS_UNSPECIFIED
        - DISPUTE_STATUS_OPEN
        - DISPUTE_STATUS_RESOLVED
        - DISPUTE_STATUS_REJECTED
      description: Current status of a dispute

    DisputeRemedy:
      type: string
      enum:
        - DISPUTE_REMEDY_UNSPECIFIED
        - DISPUTE_REMEDY_DELIST
        - DISPUTE_REMEDY_TRANSFER
        - DISPUTE_REMEDY_RIGHTS_CORRECTION
        - DISPUTE_REMEDY_SHARE_ADJUSTMENT
      description: Remedy applied or requested for a dispute

    CoCreator:
      type: object
      properties:
        address:
          type: string
          description: Bech32 address of the co-creator
        share_bps:
          type: integer
          format: uint32
          description: Co-creator share in basis points (1-10000)

    DataAsset:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier of the data asset
        owner:
          type: string
          description: Bech32 address of the data asset owner
        name:
          type: string
          description: Human-readable name of the data asset
        description:
          type: string
          description: Detailed description of the data asset
        content_hash:
          type: string
          description: Hash of the data asset content
        fingerprint:
          type: string
          description: Content fingerprint for duplicate detection
        rights_type:
          $ref: "#/components/schemas/RightsType"
        tags:
          type: array
          items:
            type: string
          description: Searchable labels for the data asset
        co_creators:
          type: array
          items:
            $ref: "#/components/schemas/CoCreator"
          description: List of co-creators and their share allocations
        total_shares:
          type: string
          description: Total number of shares issued via bonding curve (integer as string)
        created_at:
          $ref: "#/components/schemas/Timestamp"
        is_active:
          type: boolean
          description: Whether the data asset is currently listed

    ShareHolder:
      type: object
      properties:
        address:
          type: string
          description: Bech32 address of the shareholder
        asset_id:
          type: string
          description: ID of the data asset
        shares:
          type: string
          description: Number of shares held (integer as string)
        purchased_at:
          $ref: "#/components/schemas/Timestamp"

    Dispute:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier of the dispute
        asset_id:
          type: string
          description: ID of the data asset being disputed
        plaintiff:
          type: string
          description: Bech32 address of the dispute filer
        reason:
          type: string
          description: Description of the dispute reason
        evidence_hash:
          type: string
          description: Hash of the evidence data
        status:
          $ref: "#/components/schemas/DisputeStatus"
        remedy:
          $ref: "#/components/schemas/DisputeRemedy"
        arbitrator:
          type: string
          description: Bech32 address of the arbitrator who resolved the dispute
        resolved_at:
          $ref: "#/components/schemas/Timestamp"
        requested_remedy:
          $ref: "#/components/schemas/DisputeRemedy"

    QueryDataAssetResponse:
      type: object
      properties:
        data_asset:
          $ref: "#/components/schemas/DataAsset"

    QueryDataAssetsResponse:
      type: object
      properties:
        data_assets:
          type: array
          items:
            $ref: "#/components/schemas/DataAsset"
        pagination:
          $ref: "#/components/schemas/PageResponse"

    QuerySharesResponse:
      type: object
      properties:
        shareholders:
          type: array
          items:
            $ref: "#/components/schemas/ShareHolder"
        pagination:
          $ref: "#/components/schemas/PageResponse"

    QueryDisputeResponse:
      type: object
      properties:
        dispute:
          $ref: "#/components/schemas/Dispute"

    QueryDisputesResponse:
      type: object
      properties:
        disputes:
          type: array
          items:
            $ref: "#/components/schemas/Dispute"
        pagination:
          $ref: "#/components/schemas/PageResponse"

    # ─── Settlement Schemas ─────────────────────────────────────────────

    EscrowStatus:
      type: string
      enum:
        - ESCROW_STATUS_UNSPECIFIED
        - ESCROW_STATUS_LOCKED
        - ESCROW_STATUS_RELEASED
        - ESCROW_STATUS_REFUNDED
        - ESCROW_STATUS_EXPIRED
      description: Current state of an escrow

    Escrow:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier of the escrow
        creator:
          type: string
          description: Bech32 address of the escrow creator (consumer)
        provider:
          type: string
          description: Bech32 address that receives funds upon release
        amount:
          $ref: "#/components/schemas/Coin"
        status:
          $ref: "#/components/schemas/EscrowStatus"
        created_at:
          $ref: "#/components/schemas/Timestamp"
        expires_at:
          $ref: "#/components/schemas/Timestamp"

    BondingCurveState:
      type: object
      description: |
        Bancor bonding curve state for a data asset.
        Pricing: tokens = supply * (sqrt(1 + payment/reserve) - 1), connector weight = 0.5.
      properties:
        asset_id:
          type: string
          description: Unique identifier of the asset
        total_shares:
          type: string
          description: Total number of shares outstanding (integer as string)
        reserve:
          type: string
          description: Total reserve backing the bonding curve (integer as string, in uoas)
        price_factor:
          type: string
          description: Coefficient for the bonding curve pricing function (decimal as string)
        buyer_count:
          type: integer
          format: uint32
          description: Number of unique buyers of this asset

    QueryEscrowResponse:
      type: object
      properties:
        escrow:
          $ref: "#/components/schemas/Escrow"

    QueryEscrowsByCreatorResponse:
      type: object
      properties:
        escrows:
          type: array
          items:
            $ref: "#/components/schemas/Escrow"
        pagination:
          $ref: "#/components/schemas/PageResponse"

    QueryBondingCurvePriceResponse:
      type: object
      properties:
        current_price:
          $ref: "#/components/schemas/Coin"
        state:
          $ref: "#/components/schemas/BondingCurveState"

    # ─── Capability Schemas ─────────────────────────────────────────────

    Capability:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier of the capability
        provider:
          type: string
          description: Bech32 address of the capability provider
        name:
          type: string
          description: Human-readable name of the capability
        description:
          type: string
          description: Detailed description of the capability
        endpoint_url:
          type: string
          description: Encrypted endpoint URL for the capability
        price_per_call:
          $ref: "#/components/schemas/Coin"
        tags:
          type: array
          items:
            type: string
          description: Searchable labels for the capability
        rate_limit:
          type: string
          format: uint64
          description: Maximum number of calls allowed per block
        total_calls:
          type: string
          format: uint64
          description: Total number of invocations
        total_earned:
          type: string
          description: Total amount earned (integer as string, in uoas)
        avg_latency_ms:
          type: string
          format: uint64
          description: Average invocation latency in milliseconds
        success_rate:
          type: integer
          format: uint32
          description: Success rate in basis points (0-10000 = 0%-100%)
        is_active:
          type: boolean
          description: Whether the capability is currently available
        created_at:
          $ref: "#/components/schemas/Timestamp"

    QueryCapabilityResponse:
      type: object
      properties:
        capability:
          $ref: "#/components/schemas/Capability"

    QueryCapabilitiesResponse:
      type: object
      properties:
        capabilities:
          type: array
          items:
            $ref: "#/components/schemas/Capability"
        pagination:
          $ref: "#/components/schemas/PageResponse"

    QueryCapabilitiesByProviderResponse:
      type: object
      properties:
        capabilities:
          type: array
          items:
            $ref: "#/components/schemas/Capability"
        pagination:
          $ref: "#/components/schemas/PageResponse"

    QueryEarningsResponse:
      type: object
      properties:
        total_earned:
          type: array
          items:
            $ref: "#/components/schemas/Coin"
          description: Total amount earned across all capabilities
        total_calls:
          type: string
          format: uint64
          description: Total number of successful invocations

    # ─── Reputation Schemas ─────────────────────────────────────────────

    ReputationScore:
      type: object
      properties:
        address:
          type: string
          description: Bech32 address this reputation belongs to
        total_score:
          type: string
          format: uint64
          description: Cumulative reputation score (0-500 range)
        total_feedbacks:
          type: string
          format: uint64
          description: Total number of feedbacks received
        verified_feedbacks:
          type: string
          format: uint64
          description: Number of feedbacks from verified invocations
        last_updated:
          $ref: "#/components/schemas/Timestamp"

    Feedback:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier of the feedback
        invocation_id:
          type: string
          description: ID of the invocation being rated
        from:
          type: string
          description: Bech32 address of the feedback submitter
        to:
          type: string
          description: Bech32 address of the entity being rated
        rating:
          type: integer
          format: uint32
          description: Score in range 0-500 (representing 0.0-5.0)
        comment:
          type: string
          description: Optional text comment
        verified:
          type: boolean
          description: Whether the feedback is from a verified invocation participant
        timestamp:
          $ref: "#/components/schemas/Timestamp"

    QueryReputationResponse:
      type: object
      properties:
        reputation:
          $ref: "#/components/schemas/ReputationScore"

    QueryFeedbackResponse:
      type: object
      properties:
        feedbacks:
          type: array
          items:
            $ref: "#/components/schemas/Feedback"

    QueryLeaderboardResponse:
      type: object
      properties:
        scores:
          type: array
          items:
            $ref: "#/components/schemas/ReputationScore"
        pagination:
          $ref: "#/components/schemas/PageResponse"
