name: stack-boundary

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  boundary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Enforce stack boundaries
        run: python3 scripts/check_stack_boundary.py
