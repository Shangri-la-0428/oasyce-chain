name: Repair VPS SSH

on:
  workflow_dispatch:

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Install SSH key
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Restart ssh.service safely
        env:
          VPS_HOST: 47.93.32.88
          VPS_PORT: 29222
          VPS_USER: root
        run: |
          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=15 -p ${VPS_PORT}"

          ssh ${SSH_OPTS} "${VPS_USER}@${VPS_HOST}" 'bash -s' <<'EOF'
          set -euo pipefail
          sshd -t
          systemctl restart ssh
          sleep 3
          systemctl is-active ssh
          systemctl status ssh --no-pager | tail -50
          EOF
