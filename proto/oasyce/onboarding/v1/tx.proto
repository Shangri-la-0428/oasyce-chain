syntax = "proto3";
package oasyce.onboarding.v1;

option go_package = "github.com/oasyce/chain/x/onboarding/types";

import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";
import "amino/amino.proto";

// Msg defines the onboarding module's gRPC message service.
service Msg {
  option (cosmos.msg.v1.service) = true;

  // SelfRegister registers a new user via proof-of-work.
  rpc SelfRegister(MsgSelfRegister) returns (MsgSelfRegisterResponse);

  // RepayDebt allows a user to repay their airdrop debt.
  rpc RepayDebt(MsgRepayDebt) returns (MsgRepayDebtResponse);
}

// MsgSelfRegister registers a new user by providing a valid PoW nonce.
// The chain verifies sha256(address || nonce_bytes) has sufficient leading zero bits.
message MsgSelfRegister {
  option (cosmos.msg.v1.signer) = "creator";
  option (amino.name) = "oasyce/onboarding/MsgSelfRegister";

  // creator is the new user's address.
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // nonce is the proof-of-work nonce.
  uint64 nonce = 2;
}

// MsgSelfRegisterResponse is the response for MsgSelfRegister.
message MsgSelfRegisterResponse {
  // airdrop_amount is the amount of tokens received.
  string airdrop_amount = 1 [
    (cosmos_proto.scalar) = "cosmos.Int",
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];
}

// MsgRepayDebt repays airdrop debt.
message MsgRepayDebt {
  option (cosmos.msg.v1.signer) = "creator";
  option (amino.name) = "oasyce/onboarding/MsgRepayDebt";

  // creator is the user's address.
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // amount is the repayment amount in uoas.
  string amount = 2 [
    (cosmos_proto.scalar) = "cosmos.Int",
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];
}

// MsgRepayDebtResponse is the response for MsgRepayDebt.
message MsgRepayDebtResponse {
  // remaining_debt after this repayment.
  string remaining_debt = 1 [
    (cosmos_proto.scalar) = "cosmos.Int",
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];
}
