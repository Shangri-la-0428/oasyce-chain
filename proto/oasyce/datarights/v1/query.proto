syntax = "proto3";
package oasyce.datarights.v1;

option go_package = "github.com/oasyce/chain/x/datarights/types";

import "cosmos/base/query/v1beta1/pagination.proto";
import "gogoproto/gogo.proto";
import "google/api/annotations.proto";
import "oasyce/datarights/v1/types.proto";
import "oasyce/datarights/v1/genesis.proto";

// Query defines the datarights module's gRPC query service.
service Query {
  // DataAsset queries a data asset by ID.
  rpc DataAsset(QueryDataAssetRequest) returns (QueryDataAssetResponse) {
    option (google.api.http).get =
        "/oasyce/datarights/v1/data_asset/{asset_id}";
  }

  // DataAssets queries all data assets with optional filters.
  rpc DataAssets(QueryDataAssetsRequest) returns (QueryDataAssetsResponse) {
    option (google.api.http).get = "/oasyce/datarights/v1/data_assets";
  }

  // Shares queries the shareholders of a data asset.
  rpc Shares(QuerySharesRequest) returns (QuerySharesResponse) {
    option (google.api.http).get =
        "/oasyce/datarights/v1/shares/{asset_id}";
  }

  // Dispute queries a dispute by ID.
  rpc Dispute(QueryDisputeRequest) returns (QueryDisputeResponse) {
    option (google.api.http).get =
        "/oasyce/datarights/v1/dispute/{dispute_id}";
  }

  // Disputes queries all disputes with optional asset filter.
  rpc Disputes(QueryDisputesRequest) returns (QueryDisputesResponse) {
    option (google.api.http).get = "/oasyce/datarights/v1/disputes";
  }

  // MigrationPath queries a specific migration path by source and target.
  rpc MigrationPath(QueryMigrationPathRequest) returns (QueryMigrationPathResponse) {
    option (google.api.http).get =
        "/oasyce/datarights/v1/migration_path/{source_asset_id}/{target_asset_id}";
  }

  // MigrationPaths queries all migration paths from a given source asset.
  rpc MigrationPaths(QueryMigrationPathsRequest) returns (QueryMigrationPathsResponse) {
    option (google.api.http).get =
        "/oasyce/datarights/v1/migration_paths/{source_asset_id}";
  }

  // AssetChildren queries all assets that have a given parent_asset_id.
  rpc AssetChildren(QueryAssetChildrenRequest) returns (QueryAssetChildrenResponse) {
    option (google.api.http).get =
        "/oasyce/datarights/v1/asset_children/{parent_asset_id}";
  }

  // DatarightsParams queries the module parameters.
  rpc DatarightsParams(QueryParamsRequest) returns (QueryParamsResponse) {
    option (google.api.http).get = "/oasyce/datarights/v1/params";
  }

  // AccessLevel queries the access level for a given address on a data asset.
  rpc AccessLevel(QueryAccessLevelRequest) returns (QueryAccessLevelResponse) {
    option (google.api.http).get =
        "/oasyce/datarights/v1/access_level/{asset_id}/{address}";
  }
}

// QueryDataAssetRequest is the request type for the Query/DataAsset RPC.
message QueryDataAssetRequest {
  string asset_id = 1;
}

// QueryDataAssetResponse is the response type for the Query/DataAsset RPC.
message QueryDataAssetResponse {
  DataAsset data_asset = 1 [(gogoproto.nullable) = false];
}

// QueryDataAssetsRequest is the request type for the Query/DataAssets RPC.
message QueryDataAssetsRequest {
  // tag filters data assets by tag. Empty returns all.
  string tag = 1;

  // owner filters data assets by owner address. Empty returns all.
  string owner = 2;

  cosmos.base.query.v1beta1.PageRequest pagination = 3;
}

// QueryDataAssetsResponse is the response type for the Query/DataAssets RPC.
message QueryDataAssetsResponse {
  repeated DataAsset data_assets = 1 [(gogoproto.nullable) = false];
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

// QuerySharesRequest is the request type for the Query/Shares RPC.
message QuerySharesRequest {
  string asset_id = 1;
  cosmos.base.query.v1beta1.PageRequest pagination = 2;
}

// QuerySharesResponse is the response type for the Query/Shares RPC.
message QuerySharesResponse {
  repeated ShareHolder shareholders = 1 [(gogoproto.nullable) = false];
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

// QueryDisputeRequest is the request type for the Query/Dispute RPC.
message QueryDisputeRequest {
  string dispute_id = 1;
}

// QueryDisputeResponse is the response type for the Query/Dispute RPC.
message QueryDisputeResponse {
  Dispute dispute = 1 [(gogoproto.nullable) = false];
}

// QueryDisputesRequest is the request type for the Query/Disputes RPC.
message QueryDisputesRequest {
  // asset_id filters disputes by asset. Empty returns all.
  string asset_id = 1;

  cosmos.base.query.v1beta1.PageRequest pagination = 2;
}

// QueryDisputesResponse is the response type for the Query/Disputes RPC.
message QueryDisputesResponse {
  repeated Dispute disputes = 1 [(gogoproto.nullable) = false];
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

// QueryMigrationPathRequest is the request type for the Query/MigrationPath RPC.
message QueryMigrationPathRequest {
  string source_asset_id = 1;
  string target_asset_id = 2;
}

// QueryMigrationPathResponse is the response type for the Query/MigrationPath RPC.
message QueryMigrationPathResponse {
  MigrationPath migration_path = 1 [(gogoproto.nullable) = false];
}

// QueryMigrationPathsRequest is the request type for the Query/MigrationPaths RPC.
message QueryMigrationPathsRequest {
  string source_asset_id = 1;
}

// QueryMigrationPathsResponse is the response type for the Query/MigrationPaths RPC.
message QueryMigrationPathsResponse {
  repeated MigrationPath migration_paths = 1 [(gogoproto.nullable) = false];
}

// QueryAssetChildrenRequest is the request type for the Query/AssetChildren RPC.
message QueryAssetChildrenRequest {
  string parent_asset_id = 1;
}

// QueryAssetChildrenResponse is the response type for the Query/AssetChildren RPC.
message QueryAssetChildrenResponse {
  repeated DataAsset data_assets = 1 [(gogoproto.nullable) = false];
}

// QueryParamsRequest is the request type for the Query/Params RPC.
message QueryParamsRequest {}

// QueryParamsResponse is the response type for the Query/Params RPC.
message QueryParamsResponse {
  Params params = 1 [(gogoproto.nullable) = false];
}

// QueryAccessLevelRequest is the request type for the Query/AccessLevel RPC.
message QueryAccessLevelRequest {
  string asset_id = 1;
  string address = 2;
}

// QueryAccessLevelResponse is the response type for the Query/AccessLevel RPC.
message QueryAccessLevelResponse {
  // access_level is the access level (L0, L1, L2, L3, or empty if none).
  string access_level = 1;

  // equity_bps is the holder's equity in basis points (10000 = 100%).
  uint64 equity_bps = 2;

  // shares is the number of shares held.
  string shares = 3;

  // total_shares is the total shares outstanding for the asset.
  string total_shares = 4;
}
