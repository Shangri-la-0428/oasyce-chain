syntax = "proto3";
package oasyce.datarights.v1;

option go_package = "github.com/oasyce/chain/x/datarights/types";

import "cosmos/base/v1beta1/coin.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";
import "oasyce/datarights/v1/types.proto";

// GenesisState defines the datarights module's genesis state.
message GenesisState {
  // data_assets is the list of all data assets at genesis.
  repeated DataAsset data_assets = 1 [(gogoproto.nullable) = false];

  // shareholders is the list of all share holdings at genesis.
  repeated ShareHolder shareholders = 2 [(gogoproto.nullable) = false];

  // disputes is the list of all disputes at genesis.
  repeated Dispute disputes = 3 [(gogoproto.nullable) = false];

  // params defines the module parameters at genesis.
  Params params = 4 [(gogoproto.nullable) = false];

  // migration_paths is the list of all migration paths at genesis.
  repeated MigrationPath migration_paths = 5 [(gogoproto.nullable) = false];

  // asset_reserves stores bonding curve reserve amounts per asset.
  repeated AssetReserve asset_reserves = 6 [(gogoproto.nullable) = false];
}

// AssetReserve stores the bonding curve reserve and denomination for a data asset.
message AssetReserve {
  string asset_id = 1;
  string reserve = 2 [(cosmos_proto.scalar) = "cosmos.Int", (gogoproto.customtype) = "cosmossdk.io/math.Int", (gogoproto.nullable) = false];
  string reserve_denom = 3;
}

// Params defines the parameters for the datarights module.
message Params {
  option (gogoproto.goproto_stringer) = false;

  // max_co_creators is the maximum number of co-creators per data asset.
  uint32 max_co_creators = 1;

  // dispute_deposit is the deposit required for filing a dispute.
  cosmos.base.v1beta1.Coin dispute_deposit = 2 [(gogoproto.nullable) = false];

  // dispute_timeout_days is the number of days before a dispute times out.
  uint32 dispute_timeout_days = 3;

  // shutdown_cooldown_seconds is the cooldown period before settlement claims are allowed.
  uint64 shutdown_cooldown_seconds = 4;
}
