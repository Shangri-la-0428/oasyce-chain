syntax = "proto3";
package oasyce.datarights.v1;

option go_package = "github.com/oasyce/chain/x/datarights/types";

import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";
import "google/protobuf/timestamp.proto";

// RightsType enumerates the possible rights types for a data asset.
enum RightsType {
  option (gogoproto.goproto_enum_prefix) = false;

  // RIGHTS_TYPE_UNSPECIFIED is the default value.
  RIGHTS_TYPE_UNSPECIFIED = 0;
  // RIGHTS_TYPE_ORIGINAL means the asset is an original creation.
  RIGHTS_TYPE_ORIGINAL = 1;
  // RIGHTS_TYPE_CO_CREATION means the asset is a collaborative creation.
  RIGHTS_TYPE_CO_CREATION = 2;
  // RIGHTS_TYPE_LICENSED means the asset is used under a license.
  RIGHTS_TYPE_LICENSED = 3;
  // RIGHTS_TYPE_COLLECTION means the asset is a curated collection.
  RIGHTS_TYPE_COLLECTION = 4;
}

// DisputeStatus enumerates the possible states of a dispute.
enum DisputeStatus {
  option (gogoproto.goproto_enum_prefix) = false;

  // DISPUTE_STATUS_UNSPECIFIED is the default value.
  DISPUTE_STATUS_UNSPECIFIED = 0;
  // DISPUTE_STATUS_OPEN means the dispute is open and pending resolution.
  DISPUTE_STATUS_OPEN = 1;
  // DISPUTE_STATUS_RESOLVED means the dispute has been resolved.
  DISPUTE_STATUS_RESOLVED = 2;
  // DISPUTE_STATUS_REJECTED means the dispute was rejected.
  DISPUTE_STATUS_REJECTED = 3;
}

// DisputeRemedy enumerates the possible remedies for a dispute.
enum DisputeRemedy {
  option (gogoproto.goproto_enum_prefix) = false;

  // DISPUTE_REMEDY_UNSPECIFIED is the default value.
  DISPUTE_REMEDY_UNSPECIFIED = 0;
  // DISPUTE_REMEDY_DELIST removes the asset from the marketplace.
  DISPUTE_REMEDY_DELIST = 1;
  // DISPUTE_REMEDY_TRANSFER transfers ownership of the asset.
  DISPUTE_REMEDY_TRANSFER = 2;
  // DISPUTE_REMEDY_RIGHTS_CORRECTION corrects the rights metadata.
  DISPUTE_REMEDY_RIGHTS_CORRECTION = 3;
  // DISPUTE_REMEDY_SHARE_ADJUSTMENT adjusts co-creator share allocations.
  DISPUTE_REMEDY_SHARE_ADJUSTMENT = 4;
}

// AssetStatus enumerates the lifecycle states of a data asset.
enum AssetStatus {
  option (gogoproto.goproto_enum_prefix) = false;

  // ASSET_STATUS_ACTIVE is the default state — normal operation.
  ASSET_STATUS_ACTIVE = 0;
  // ASSET_STATUS_SHUTTING_DOWN means the owner initiated shutdown; cooldown in progress.
  ASSET_STATUS_SHUTTING_DOWN = 1;
  // ASSET_STATUS_SETTLED means all shares have been claimed; terminal state.
  ASSET_STATUS_SETTLED = 2;
}

// DataAsset represents a registered data asset on-chain.
message DataAsset {
  option (gogoproto.equal) = false;
  option (gogoproto.goproto_getters) = false;

  // id is the unique identifier of the data asset.
  string id = 1;

  // owner is the address of the data asset owner.
  string owner = 2 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // name is the human-readable name of the data asset.
  string name = 3;

  // description is a detailed description of the data asset.
  string description = 4;

  // content_hash is the hash of the data asset content.
  string content_hash = 5;

  // fingerprint is a content fingerprint for duplicate detection.
  string fingerprint = 6;

  // rights_type is the rights classification of the data asset.
  RightsType rights_type = 7;

  // tags are searchable labels for the data asset.
  repeated string tags = 8;

  // co_creators is the list of co-creators and their share allocations.
  repeated CoCreator co_creators = 9 [(gogoproto.nullable) = false];

  // total_shares is the total number of shares issued via bonding curve.
  string total_shares = 10 [
    (cosmos_proto.scalar) = "cosmos.Int",
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];

  // created_at is the timestamp when the data asset was registered.
  google.protobuf.Timestamp created_at = 11
      [(gogoproto.nullable) = false, (gogoproto.stdtime) = true];

  // status is the lifecycle state of the data asset.
  AssetStatus status = 12;

  // shutdown_initiated_at is the timestamp when shutdown was initiated.
  google.protobuf.Timestamp shutdown_initiated_at = 13
      [(gogoproto.nullable) = false, (gogoproto.stdtime) = true];

  // parent_asset_id links this asset to a previous version (empty for v1 assets).
  string parent_asset_id = 14;

  // version is the version number (1 for original, incremented for each successor).
  uint32 version = 15;

  // migration_enabled indicates whether shareholders of the parent can migrate shares.
  bool migration_enabled = 16;
}

// MigrationPath represents a migration path between two asset versions.
message MigrationPath {
  option (gogoproto.equal) = false;
  option (gogoproto.goproto_getters) = false;

  // source_asset_id is the asset being migrated from.
  string source_asset_id = 1;

  // target_asset_id is the asset being migrated to.
  string target_asset_id = 2;

  // exchange_rate_bps is the share exchange rate in basis points (10000 = 1:1).
  uint32 exchange_rate_bps = 3;

  // max_migrated_shares caps the total shares that can migrate (0 = unlimited).
  string max_migrated_shares = 4 [
    (cosmos_proto.scalar) = "cosmos.Int",
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];

  // total_migrated tracks how many shares have already migrated.
  string total_migrated = 5 [
    (cosmos_proto.scalar) = "cosmos.Int",
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];

  // enabled indicates whether this migration path is active.
  bool enabled = 6;

  // created_at is the timestamp when this migration path was created.
  google.protobuf.Timestamp created_at = 7
      [(gogoproto.nullable) = false, (gogoproto.stdtime) = true];
}

// CoCreator represents a co-creator of a data asset with their share allocation.
message CoCreator {
  option (gogoproto.equal) = false;
  option (gogoproto.goproto_getters) = false;

  // address is the account address of the co-creator.
  string address = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // share_bps is the co-creator's share in basis points (1-10000).
  uint32 share_bps = 2;
}

// ShareHolder represents an account holding shares of a data asset.
message ShareHolder {
  option (gogoproto.equal) = false;
  option (gogoproto.goproto_getters) = false;

  // address is the account address of the shareholder.
  string address = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // asset_id is the ID of the data asset.
  string asset_id = 2;

  // shares is the number of shares held.
  string shares = 3 [
    (cosmos_proto.scalar) = "cosmos.Int",
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];

  // purchased_at is the timestamp when the shares were purchased.
  google.protobuf.Timestamp purchased_at = 4
      [(gogoproto.nullable) = false, (gogoproto.stdtime) = true];
}

// Dispute represents a filed dispute against a data asset.
message Dispute {
  option (gogoproto.equal) = false;
  option (gogoproto.goproto_getters) = false;

  // id is the unique identifier of the dispute.
  string id = 1;

  // asset_id is the ID of the data asset being disputed.
  string asset_id = 2;

  // plaintiff is the address of the dispute filer.
  string plaintiff = 3 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // reason is a description of the dispute reason.
  string reason = 4;

  // evidence_hash is the hash of the evidence data.
  string evidence_hash = 5;

  // status is the current status of the dispute.
  DisputeStatus status = 6;

  // remedy is the applied remedy (set upon resolution).
  DisputeRemedy remedy = 7;

  // arbitrator is the address of the arbitrator who resolved the dispute.
  string arbitrator = 8 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // resolved_at is the timestamp when the dispute was resolved.
  google.protobuf.Timestamp resolved_at = 9
      [(gogoproto.nullable) = false, (gogoproto.stdtime) = true];

  // requested_remedy is the remedy requested by the plaintiff when filing.
  // The jury votes on whether to apply this remedy.
  DisputeRemedy requested_remedy = 10;
}
