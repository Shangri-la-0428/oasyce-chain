syntax = "proto3";
package oasyce.datarights.v1;

option go_package = "github.com/oasyce/chain/x/datarights/types";

import "cosmos/base/v1beta1/coin.proto";
import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";
import "amino/amino.proto";
import "oasyce/datarights/v1/types.proto";

// Msg defines the datarights module's gRPC message service.
service Msg {
  option (cosmos.msg.v1.service) = true;

  // RegisterDataAsset registers a new data asset on-chain.
  rpc RegisterDataAsset(MsgRegisterDataAsset)
      returns (MsgRegisterDataAssetResponse);

  // BuyShares purchases shares of a data asset via bonding curve.
  rpc BuyShares(MsgBuyShares) returns (MsgBuySharesResponse);

  // FileDispute files a dispute against a data asset.
  rpc FileDispute(MsgFileDispute) returns (MsgFileDisputeResponse);

  // ResolveDispute resolves an open dispute (arbitrator only).
  rpc ResolveDispute(MsgResolveDispute) returns (MsgResolveDisputeResponse);

  // SellShares sells shares back to the bonding curve.
  rpc SellShares(MsgSellShares) returns (MsgSellSharesResponse);

  // DelistAsset allows the asset owner to voluntarily delist.
  // Deprecated: use InitiateShutdown instead.
  rpc DelistAsset(MsgDelistAsset) returns (MsgDelistAssetResponse);

  // InitiateShutdown begins graceful shutdown of a data asset (owner only).
  rpc InitiateShutdown(MsgInitiateShutdown) returns (MsgInitiateShutdownResponse);

  // ClaimSettlement claims pro-rata reserve payout after shutdown cooldown.
  rpc ClaimSettlement(MsgClaimSettlement) returns (MsgClaimSettlementResponse);

  // CreateMigrationPath creates a migration path from source to target asset.
  rpc CreateMigrationPath(MsgCreateMigrationPath) returns (MsgCreateMigrationPathResponse);

  // DisableMigration disables an active migration path (owner of target asset).
  rpc DisableMigration(MsgDisableMigration) returns (MsgDisableMigrationResponse);

  // Migrate converts shares from source asset to target asset via migration path.
  rpc Migrate(MsgMigrate) returns (MsgMigrateResponse);

  // UpdateServiceUrl updates the data access endpoint for an asset (owner only).
  rpc UpdateServiceUrl(MsgUpdateServiceUrl) returns (MsgUpdateServiceUrlResponse);
}

// MsgRegisterDataAsset registers a new data asset on-chain.
message MsgRegisterDataAsset {
  option (cosmos.msg.v1.signer) = "creator";
  option (amino.name) = "oasyce/datarights/MsgRegisterDataAsset";

  // creator is the address of the data asset owner.
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // name is the human-readable name of the data asset.
  string name = 2;

  // description is a detailed description of the data asset.
  string description = 3;

  // content_hash is the hash of the data asset content.
  string content_hash = 4;

  // rights_type is the rights classification.
  RightsType rights_type = 5;

  // tags are searchable labels for the data asset.
  repeated string tags = 6;

  // co_creators is the list of co-creators and their share allocations.
  repeated CoCreator co_creators = 7 [(gogoproto.nullable) = false];

  // parent_asset_id is the ID of the parent asset (empty for original v1 assets).
  string parent_asset_id = 8;

  // service_url is the endpoint where buyers can access the data (optional).
  string service_url = 9;
}

// MsgRegisterDataAssetResponse is the response for MsgRegisterDataAsset.
message MsgRegisterDataAssetResponse {
  // asset_id is the unique identifier of the registered data asset.
  string asset_id = 1;
}

// MsgBuyShares purchases shares of a data asset via bonding curve.
message MsgBuyShares {
  option (cosmos.msg.v1.signer) = "creator";
  option (amino.name) = "oasyce/datarights/MsgBuyShares";

  // creator is the address of the buyer.
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // asset_id is the ID of the data asset to buy shares of.
  string asset_id = 2;

  // amount is the coin amount to spend on shares.
  cosmos.base.v1beta1.Coin amount = 3 [(gogoproto.nullable) = false];

  // min_shares_out is the minimum shares the buyer expects (slippage protection).
  // If the bonding curve would mint fewer than this, the tx is rejected.
  // Optional: set to "0" or omit to disable.
  string min_shares_out = 4 [
    (cosmos_proto.scalar) = "cosmos.Int",
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = true
  ];
}

// MsgBuySharesResponse is the response for MsgBuyShares.
message MsgBuySharesResponse {
  // shares_purchased is the number of shares acquired.
  string shares_purchased = 1 [
    (cosmos_proto.scalar) = "cosmos.Int",
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];
}

// MsgFileDispute files a dispute against a data asset.
message MsgFileDispute {
  option (cosmos.msg.v1.signer) = "creator";
  option (amino.name) = "oasyce/datarights/MsgFileDispute";

  // creator is the address of the plaintiff.
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // asset_id is the ID of the data asset being disputed.
  string asset_id = 2;

  // reason is a description of the dispute reason.
  string reason = 3;

  // evidence is the raw evidence data.
  bytes evidence = 4;

  // requested_remedy is the remedy the plaintiff wants if the dispute is upheld.
  DisputeRemedy requested_remedy = 5;
}

// MsgFileDisputeResponse is the response for MsgFileDispute.
message MsgFileDisputeResponse {
  // dispute_id is the unique identifier of the created dispute.
  string dispute_id = 1;
}

// MsgResolveDispute resolves an open dispute.
message MsgResolveDispute {
  option (cosmos.msg.v1.signer) = "creator";
  option (amino.name) = "oasyce/datarights/MsgResolveDispute";

  // creator is the address of the arbitrator resolving the dispute.
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // dispute_id is the ID of the dispute to resolve.
  string dispute_id = 2;

  // remedy is the chosen dispute remedy.
  DisputeRemedy remedy = 3;

  // details contains additional resolution details.
  bytes details = 4;
}

// MsgResolveDisputeResponse is the response for MsgResolveDispute.
message MsgResolveDisputeResponse {}

// MsgSellShares sells shares back to the bonding curve.
message MsgSellShares {
  option (cosmos.msg.v1.signer) = "creator";
  option (amino.name) = "oasyce/datarights/MsgSellShares";

  // creator is the address of the seller.
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // asset_id is the ID of the data asset.
  string asset_id = 2;

  // shares is the number of shares to sell.
  string shares = 3 [
    (cosmos_proto.scalar) = "cosmos.Int",
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];

  // min_payout_out is the minimum payout expected (slippage protection).
  // Optional: nil or zero disables the check.
  string min_payout_out = 4 [
    (cosmos_proto.scalar) = "cosmos.Int",
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = true
  ];
}

// MsgSellSharesResponse is the response for MsgSellShares.
message MsgSellSharesResponse {
  // payout is the amount received after fees.
  string payout = 1 [
    (cosmos_proto.scalar) = "cosmos.Int",
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];
}

// MsgDelistAsset allows an asset owner to voluntarily delist their asset.
message MsgDelistAsset {
  option (cosmos.msg.v1.signer) = "creator";
  option (amino.name) = "oasyce/datarights/MsgDelistAsset";

  // creator is the address of the asset owner.
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // asset_id is the ID of the data asset to delist.
  string asset_id = 2;
}

// MsgDelistAssetResponse is the response for MsgDelistAsset.
message MsgDelistAssetResponse {}

// MsgInitiateShutdown begins graceful shutdown of a data asset.
message MsgInitiateShutdown {
  option (cosmos.msg.v1.signer) = "creator";
  option (amino.name) = "oasyce/datarights/MsgInitiateShutdown";

  // creator is the address of the asset owner.
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // asset_id is the ID of the data asset to shut down.
  string asset_id = 2;
}

// MsgInitiateShutdownResponse is the response for MsgInitiateShutdown.
message MsgInitiateShutdownResponse {}

// MsgClaimSettlement claims pro-rata reserve payout after shutdown cooldown.
message MsgClaimSettlement {
  option (cosmos.msg.v1.signer) = "creator";
  option (amino.name) = "oasyce/datarights/MsgClaimSettlement";

  // creator is the address of the shareholder claiming settlement.
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // asset_id is the ID of the data asset.
  string asset_id = 2;
}

// MsgClaimSettlementResponse is the response for MsgClaimSettlement.
message MsgClaimSettlementResponse {
  // payout is the amount received.
  string payout = 1 [
    (cosmos_proto.scalar) = "cosmos.Int",
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];
}

// MsgCreateMigrationPath creates a migration path between two asset versions.
message MsgCreateMigrationPath {
  option (cosmos.msg.v1.signer) = "creator";
  option (amino.name) = "oasyce/datarights/MsgCreateMigrationPath";

  // creator is the address of the target asset owner.
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // source_asset_id is the asset being migrated from.
  string source_asset_id = 2;

  // target_asset_id is the asset being migrated to.
  string target_asset_id = 3;

  // exchange_rate_bps is the share exchange rate in basis points (10000 = 1:1).
  uint32 exchange_rate_bps = 4;

  // max_migrated_shares caps the total shares that can migrate (0 = unlimited).
  string max_migrated_shares = 5 [
    (cosmos_proto.scalar) = "cosmos.Int",
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];
}

// MsgCreateMigrationPathResponse is the response for MsgCreateMigrationPath.
message MsgCreateMigrationPathResponse {}

// MsgDisableMigration disables an active migration path.
message MsgDisableMigration {
  option (cosmos.msg.v1.signer) = "creator";
  option (amino.name) = "oasyce/datarights/MsgDisableMigration";

  // creator is the address of the target asset owner.
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // source_asset_id is the source asset of the migration path.
  string source_asset_id = 2;

  // target_asset_id is the target asset of the migration path.
  string target_asset_id = 3;
}

// MsgDisableMigrationResponse is the response for MsgDisableMigration.
message MsgDisableMigrationResponse {}

// MsgMigrate converts shares from source asset to target asset.
message MsgMigrate {
  option (cosmos.msg.v1.signer) = "creator";
  option (amino.name) = "oasyce/datarights/MsgMigrate";

  // creator is the address of the shareholder migrating.
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // source_asset_id is the asset to migrate from.
  string source_asset_id = 2;

  // target_asset_id is the asset to migrate to.
  string target_asset_id = 3;

  // shares is the number of shares to migrate from source.
  string shares = 4 [
    (cosmos_proto.scalar) = "cosmos.Int",
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];
}

// MsgMigrateResponse is the response for MsgMigrate.
message MsgMigrateResponse {
  // shares_received is the number of shares received in the target asset.
  string shares_received = 1 [
    (cosmos_proto.scalar) = "cosmos.Int",
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];
}

// MsgUpdateServiceUrl updates the data access endpoint for an asset.
message MsgUpdateServiceUrl {
  option (cosmos.msg.v1.signer) = "creator";
  option (amino.name) = "oasyce/datarights/MsgUpdateServiceUrl";

  // creator is the address of the asset owner.
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // asset_id is the ID of the data asset.
  string asset_id = 2;

  // service_url is the new data access endpoint.
  string service_url = 3;
}

// MsgUpdateServiceUrlResponse is the response for MsgUpdateServiceUrl.
message MsgUpdateServiceUrlResponse {}
