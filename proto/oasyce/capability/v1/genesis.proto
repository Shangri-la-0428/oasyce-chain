syntax = "proto3";
package oasyce.capability.v1;

option go_package = "github.com/oasyce/chain/x/capability/types";

import "cosmos/base/v1beta1/coin.proto";
import "gogoproto/gogo.proto";
import "oasyce/capability/v1/types.proto";

// GenesisState defines the capability module's genesis state.
message GenesisState {
  // capabilities is the list of all registered capabilities at genesis.
  repeated Capability capabilities = 1 [(gogoproto.nullable) = false];

  // invocations is the list of all invocations at genesis.
  repeated Invocation invocations = 2 [(gogoproto.nullable) = false];

  // params defines the module parameters at genesis.
  Params params = 3 [(gogoproto.nullable) = false];
}

// Params defines the parameters for the capability module.
message Params {
  option (gogoproto.goproto_stringer) = false;

  // min_provider_stake is the minimum stake required to register a capability.
  cosmos.base.v1beta1.Coin min_provider_stake = 1 [(gogoproto.nullable) = false];

  // max_rate_limit is the maximum allowed rate limit per block.
  uint64 max_rate_limit = 2;

  // protocol_fee_rate is the protocol fee in basis points (e.g. 500 = 5%).
  uint64 protocol_fee_rate = 3;
}
