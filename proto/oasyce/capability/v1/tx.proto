syntax = "proto3";
package oasyce.capability.v1;

option go_package = "github.com/oasyce/chain/x/capability/types";

import "cosmos/base/v1beta1/coin.proto";
import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";
import "amino/amino.proto";

// Msg defines the capability module's gRPC message service.
service Msg {
  option (cosmos.msg.v1.service) = true;

  // RegisterCapability registers a new AI capability endpoint.
  rpc RegisterCapability(MsgRegisterCapability)
      returns (MsgRegisterCapabilityResponse);

  // InvokeCapability invokes a capability, creating an escrow and settling payment.
  rpc InvokeCapability(MsgInvokeCapability)
      returns (MsgInvokeCapabilityResponse);

  // UpdateCapability updates a capability's endpoint, price, or rate limit.
  rpc UpdateCapability(MsgUpdateCapability)
      returns (MsgUpdateCapabilityResponse);

  // DeactivateCapability takes a capability offline.
  rpc DeactivateCapability(MsgDeactivateCapability)
      returns (MsgDeactivateCapabilityResponse);

  // CompleteInvocation allows provider to submit output hash, starting the challenge window.
  rpc CompleteInvocation(MsgCompleteInvocation)
      returns (MsgCompleteInvocationResponse);

  // FailInvocation allows provider or consumer to report a failed invocation and refund escrow.
  rpc FailInvocation(MsgFailInvocation)
      returns (MsgFailInvocationResponse);

  // ClaimInvocation allows provider to claim payment after challenge window passes.
  rpc ClaimInvocation(MsgClaimInvocation)
      returns (MsgClaimInvocationResponse);

  // DisputeInvocation allows consumer to dispute a completed invocation within the challenge window.
  rpc DisputeInvocation(MsgDisputeInvocation)
      returns (MsgDisputeInvocationResponse);
}

// MsgRegisterCapability registers a new AI capability endpoint.
message MsgRegisterCapability {
  option (cosmos.msg.v1.signer) = "creator";
  option (amino.name) = "oasyce/capability/MsgRegisterCapability";

  // creator is the address of the capability provider.
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // name is the human-readable name for the capability.
  string name = 2;

  // description is a detailed description of the capability.
  string description = 3;

  // endpoint_url is the URL where the capability can be reached.
  string endpoint_url = 4;

  // price_per_call is the price charged per invocation.
  cosmos.base.v1beta1.Coin price_per_call = 5 [(gogoproto.nullable) = false];

  // tags are searchable labels for the capability.
  repeated string tags = 6;

  // rate_limit is the maximum number of calls allowed per block.
  uint64 rate_limit = 7;
}

// MsgRegisterCapabilityResponse is the response for MsgRegisterCapability.
message MsgRegisterCapabilityResponse {
  // capability_id is the unique identifier assigned to the new capability.
  string capability_id = 1;
}

// MsgInvokeCapability invokes a registered capability.
message MsgInvokeCapability {
  option (cosmos.msg.v1.signer) = "creator";
  option (amino.name) = "oasyce/capability/MsgInvokeCapability";

  // creator is the address of the consumer invoking the capability.
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // capability_id is the ID of the capability to invoke.
  string capability_id = 2;

  // input is the raw input data for the invocation.
  bytes input = 3;
}

// MsgInvokeCapabilityResponse is the response for MsgInvokeCapability.
message MsgInvokeCapabilityResponse {
  // invocation_id is the unique identifier of the created invocation.
  string invocation_id = 1;

  // escrow_id is the ID of the escrow created for the invocation.
  string escrow_id = 2;
}

// MsgUpdateCapability updates a capability's mutable fields.
message MsgUpdateCapability {
  option (cosmos.msg.v1.signer) = "creator";
  option (amino.name) = "oasyce/capability/MsgUpdateCapability";

  // creator is the address of the capability provider.
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // capability_id is the ID of the capability to update.
  string capability_id = 2;

  // endpoint_url is the new endpoint URL (empty to keep existing).
  string endpoint_url = 3;

  // price_per_call is the new price per call (nil to keep existing).
  cosmos.base.v1beta1.Coin price_per_call = 4;

  // rate_limit is the new rate limit (0 to keep existing).
  uint64 rate_limit = 5;

  // description is the new description (empty to keep existing).
  string description = 6;
}

// MsgUpdateCapabilityResponse is the response for MsgUpdateCapability.
message MsgUpdateCapabilityResponse {}

// MsgDeactivateCapability takes a capability offline.
message MsgDeactivateCapability {
  option (cosmos.msg.v1.signer) = "creator";
  option (amino.name) = "oasyce/capability/MsgDeactivateCapability";

  // creator is the address of the capability provider.
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // capability_id is the ID of the capability to deactivate.
  string capability_id = 2;
}

// MsgDeactivateCapabilityResponse is the response for MsgDeactivateCapability.
message MsgDeactivateCapabilityResponse {}

// MsgClaimInvocation allows provider to claim payment after challenge window.
message MsgClaimInvocation {
  option (cosmos.msg.v1.signer) = "creator";
  option (amino.name) = "oasyce/capability/MsgClaimInvocation";

  // creator is the provider claiming the payment.
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // invocation_id is the ID of the completed invocation to claim.
  string invocation_id = 2;
}

// MsgClaimInvocationResponse is the response for MsgClaimInvocation.
message MsgClaimInvocationResponse {}

// MsgDisputeInvocation allows consumer to dispute a completed invocation.
message MsgDisputeInvocation {
  option (cosmos.msg.v1.signer) = "creator";
  option (amino.name) = "oasyce/capability/MsgDisputeInvocation";

  // creator is the consumer disputing the invocation.
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // invocation_id is the ID of the invocation to dispute.
  string invocation_id = 2;

  // reason is the reason for the dispute.
  string reason = 3;
}

// MsgDisputeInvocationResponse is the response for MsgDisputeInvocation.
message MsgDisputeInvocationResponse {}

// MsgCompleteInvocation allows provider to submit output hash, starting the challenge window.
message MsgCompleteInvocation {
  option (cosmos.msg.v1.signer) = "creator";
  option (amino.name) = "oasyce/capability/MsgCompleteInvocation";

  // creator is the provider completing the invocation.
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // invocation_id is the ID of the invocation to complete.
  string invocation_id = 2;

  // output_hash is the hash of the invocation output (>= 32 hex chars).
  string output_hash = 3;

  // usage_report is optional JSON metadata about resource consumption (e.g. token counts).
  string usage_report = 4;
}

// MsgCompleteInvocationResponse is the response for MsgCompleteInvocation.
message MsgCompleteInvocationResponse {}

// MsgFailInvocation allows provider or consumer to report a failed invocation.
message MsgFailInvocation {
  option (cosmos.msg.v1.signer) = "creator";
  option (amino.name) = "oasyce/capability/MsgFailInvocation";

  // creator is the provider or consumer reporting the failure.
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // invocation_id is the ID of the invocation that failed.
  string invocation_id = 2;
}

// MsgFailInvocationResponse is the response for MsgFailInvocation.
message MsgFailInvocationResponse {}
